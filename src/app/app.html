<div class="h-screen flex flex-col bg-zinc-900 text-zinc-100 font-sans overflow-hidden">
  <app-header class="contents"></app-header>
  
  <div class="flex-1 flex overflow-hidden relative">
    <app-sidebar-left class="contents"></app-sidebar-left>
    <app-canvas class="contents"></app-canvas>
    <app-sidebar-right class="contents"></app-sidebar-right>

    <!-- Mobile Overlays -->
    @if (editorService.isMobile() && (editorService.showLeftSidebar() || editorService.showRightSidebar())) {
      <div 
        class="fixed inset-0 bg-black/50 z-30"
        (click)="editorService.showLeftSidebar.set(false); editorService.showRightSidebar.set(false)"
        (keydown.escape)="editorService.showLeftSidebar.set(false); editorService.showRightSidebar.set(false)"
        tabindex="0"
        aria-label="Close sidebars"
      ></div>
    }

    <!-- Delete Confirmation Modal -->
    @if (editorService.showDeleteConfirm()) {
      <app-confirmation-modal
        title="レイヤーの削除"
        message="選択したレイヤーを削除してもよろしいですか？"
        confirmText="削除する"
        [isDangerous]="true"
        (confirm)="executeDelete()"
        (cancel)="cancelDelete()"
      ></app-confirmation-modal>
    }

    <!-- Reset Confirmation Modal -->
    @if (editorService.showResetConfirm()) {
      <app-confirmation-modal
        title="編集内容のリセット"
        [message]="'全ての編集内容をリセットして初期状態に戻しますか？\nこの操作は元に戻せません。'"
        confirmText="リセットする"
        [isDangerous]="true"
        (confirm)="executeReset()"
        (cancel)="cancelReset()"
      ></app-confirmation-modal>
    }
  </div>
</div>
